<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>School Clock</title>

<style>
:root{
  --bg:#0b0f14; --card:#121825; --text:#e8eefc; --muted:#9fb0d0;
  --accent:#39d98a; --accent2:#3aa0ff; --border:rgba(255,255,255,.10);
  --warning:#f0c040; --input:#0f1624;
}
*{box-sizing:border-box;}
body{
  margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--text);
  display:grid;place-items:center;min-height:100vh;padding:18px;
}
.wrap{width:min(1180px,100%);}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.tab{
  padding:10px 16px;border-radius:999px;
  background:#1b2333;border:1px solid var(--border);
  cursor:pointer;color:var(--muted);
  user-select:none;
}
.tab[aria-selected="true"]{background:var(--accent);color:#062015;font-weight:700;}

.top{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
.time{font-size:52px;font-weight:800;line-height:1;}
.sub{margin-top:8px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}

.grid{display:grid;gap:14px;}
@media (min-width:900px){.grid{grid-template-columns:1fr 1fr;}}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.card h3{margin:0;padding:12px 14px;font-size:14px;color:var(--muted);border-bottom:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;color:var(--muted);font-size:12px;font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03);position:sticky;top:0;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top;}
tbody tr:last-child td{border-bottom:none;}
.active{background:rgba(57,217,138,.15);}
.statusNow{color:var(--accent2);font-weight:700;}
.prayer-row td{color:var(--warning);font-weight:600;background:rgba(240,192,64,.07);}
.prayer-row.active{background:rgba(240,192,64,.20);}

.locator{display:none;}
.controls{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;padding:14px;border-bottom:1px solid var(--border);}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;color:var(--muted);font-weight:700;}
.field select,.field input{
  width:100%;background:var(--input);color:var(--text);border:1px solid var(--border);
  border-radius:12px;padding:10px 12px;font:inherit;outline:none;
}
.field select:focus,.field input:focus{border-color:var(--accent2);}
.span3{grid-column:span 3;}
.span4{grid-column:span 4;}
.span2{grid-column:span 2;}
.buttonWrap{display:flex;align-items:flex-end;}
button{
  width:100%;background:var(--accent2);color:#06111e;border:0;border-radius:12px;
  padding:11px 12px;font-weight:800;cursor:pointer;
}
button.secondary{background:#1b2333;color:var(--text);border:1px solid var(--border);}
.summary{display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 14px 14px;color:var(--muted);font-size:13px;}
.badge{display:inline-flex;align-items:center;padding:6px 9px;border-radius:999px;background:#1b2333;border:1px solid var(--border);}
.tableWrap{max-height:62vh;overflow:auto;}
.room{font-weight:800;color:var(--accent);}
.muted{color:var(--muted);font-size:12px;}
.noResults{padding:20px;color:var(--muted);}
@media (max-width:850px){
  .time{font-size:42px;}
  .span2,.span3,.span4{grid-column:span 12;}
  th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none;}
}
</style>
</head>
<body>

<div class="wrap">

  <div class="tabs" role="tablist" aria-label="Schedule mode">
    <div class="tab" id="tab-ramadan" role="tab" aria-selected="false" tabindex="0">Ramadan</div>
    <div class="tab" id="tab-regular" role="tab" aria-selected="false" tabindex="0">Regular</div>
    <div class="tab" id="tab-friday" role="tab" aria-selected="false" tabindex="0">Friday</div>
    <div class="tab" id="tab-locator" role="tab" aria-selected="false" tabindex="0">Class Locator</div>
  </div>

  <div class="top">
    <div id="clock" class="time">--:--:--</div>
    <div class="sub" id="nowLabel">--</div>
  </div>

  <div id="ramadanGrid" class="grid">
    <div class="card">
      <h3>PYP (Ramadan)</h3>
      <table><tbody id="pypBody"></tbody></table>
    </div>
    <div class="card">
      <h3>Secondary (Ramadan)</h3>
      <table><tbody id="secondaryBody"></tbody></table>
    </div>
  </div>

  <div id="regularSingle" class="card" style="display:none;">
    <h3 id="regularTitle">Regular</h3>
    <table><tbody id="regularBody"></tbody></table>
  </div>

  <div id="locatorPanel" class="card locator">
    <h3>Class Locator</h3>
    <div class="controls">
      <div class="field span3">
        <label for="classFilter">Class</label>
        <select id="classFilter"><option value="">All classes</option></select>
      </div>
      <div class="field span3">
        <label for="dayFilter">Day</label>
        <select id="dayFilter">
          <option value="">All days</option>
          <option value="10000">Monday</option>
          <option value="01000">Tuesday</option>
          <option value="00100">Wednesday</option>
          <option value="00010">Thursday</option>
          <option value="00001">Friday</option>
        </select>
      </div>
      <div class="field span2">
        <label for="periodFilter">Period</label>
        <select id="periodFilter">
          <option value="">All periods</option>
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
        </select>
      </div>
      <div class="field span4">
        <label for="textFilter">Search</label>
        <input id="textFilter" type="search" placeholder="Class, room, teacher, subject or group" />
      </div>
      <div class="buttonWrap span2"><button id="nowButton" type="button">Use now</button></div>
      <div class="buttonWrap span2"><button id="clearButton" class="secondary" type="button">Clear</button></div>
    </div>
    <div class="summary" id="locatorSummary"></div>
    <div class="tableWrap">
      <table>
        <thead><tr><th>Class</th><th>Room</th><th>Subject / Group</th><th>Teacher</th><th>When</th></tr></thead>
        <tbody id="locatorBody"></tbody>
      </table>
      <div id="noResults" class="noResults" style="display:none;">No matching class locations found.</div>
    </div>
  </div>

</div>

let mode = (new Date().getDay() === 5) ? "friday" : "regular";

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));
}

function mins(t){
  const [h,m] = t.split(":");
  return (parseInt(h,10)*60) + parseInt(m,10);
}

function build(tbody, data){
  tbody.innerHTML = "";
  data.forEach(([label,start,end]) => {
    const tr = document.createElement("tr");
    tr.dataset.start = start;
    tr.dataset.end = end;
    if(label.includes("Prayer")) tr.classList.add("prayer-row");
    tr.innerHTML = `
      <td>${escapeHtml(label)}</td>
      <td>${escapeHtml(start)} – ${escapeHtml(end)}</td>
      <td class="status"></td>
    `;
    tbody.appendChild(tr);
  });
}

function highlight(tbody, label){
  const now = new Date();
  const n = now.getHours()*60 + now.getMinutes();
  let current = "";

  tbody.querySelectorAll("tr").forEach(tr => {
    tr.classList.remove("active");
    const statusCell = tr.querySelector(".status");
    statusCell.textContent = "";

    const s = mins(tr.dataset.start);
    const e = mins(tr.dataset.end);

    if(n >= s && n < e){
      tr.classList.add("active");
      statusCell.textContent = "Now";
      statusCell.classList.add("statusNow");
      current = label + ": " + tr.children[0].textContent;
    } else {
      statusCell.classList.remove("statusNow");
    }
  });

  return current || (label + ": Outside school");
}

function currentPeriodForDay(dayCode){
  const now = new Date();
  const n = now.getHours()*60 + now.getMinutes();
  const schedule = dayCode === "00001" ? fridaySchedule : xmlPeriodSchedule;
  for(const row of schedule){
    const label = row[0], start = row[1], end = row[2];
    if(label.toLowerCase().includes("break") || label.toLowerCase().includes("lunch") || label.includes("Prayer")) continue;
    if(n >= mins(start) && n < mins(end)){
      const match = label.match(/(\d+)/);
      return match ? match[1] : "";
    }
  }
  return "";
}

function periodName(dayCode, period){
  if(!period) return "All periods";
  return dayCode === "00001" ? `Lesson ${period}` : `P${period}`;
}

function classContains(classText, className){
  if(!className) return true;
  return classText.split(",").map(s => s.trim()).includes(className);
}

function populateClassFilter(){
  CLASS_NAMES.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    classFilter.appendChild(opt);
  });
}

function renderLocator(){
  const selectedClass = classFilter.value;
  const selectedDay = dayFilter.value;
  const selectedPeriod = periodFilter.value;
  const search = textFilter.value.trim().toLowerCase();

  const filtered = TIMETABLE_ROWS.filter(r => {
    const [day, period, classes, groups, subject, teachers, rooms] = r;
    if(selectedDay && day !== selectedDay) return false;
    if(selectedPeriod && String(period) !== selectedPeriod) return false;
    if(selectedClass && !classContains(classes, selectedClass)) return false;
    if(search){
      const blob = `${classes} ${groups} ${subject} ${teachers} ${rooms} ${dayNames[day] || day} P${period}`.toLowerCase();
      if(!blob.includes(search)) return false;
    }
    return true;
  }).sort((a,b) => {
    const dayOrder = {"10000":1,"01000":2,"00100":3,"00010":4,"00001":5};
    return (dayOrder[a[0]] || 9) - (dayOrder[b[0]] || 9) || a[1] - b[1] || a[2].localeCompare(b[2]);
  });

  locatorSummary.innerHTML = `
    <span class="badge">${filtered.length} result${filtered.length === 1 ? "" : "s"}</span>
    <span class="badge">${selectedClass || "All classes"}</span>
    <span class="badge">${selectedDay ? dayNames[selectedDay] : "All days"}</span>
    <span class="badge">${periodName(selectedDay, selectedPeriod)}</span>
  `;

  noResults.style.display = filtered.length ? "none" : "block";
  locatorBody.innerHTML = filtered.slice(0, 500).map(r => {
    const [day, period, classes, groups, subject, teachers, rooms] = r;
    const when = `${dayNames[day] || day} · ${periodName(day, period)}`;
    const groupLine = groups ? `<div class="muted">${escapeHtml(groups)}</div>` : "";
    return `<tr>
      <td>${escapeHtml(classes)}</td>
      <td class="room">${escapeHtml(rooms)}</td>
      <td>${escapeHtml(subject)}${groupLine}</td>
      <td>${escapeHtml(teachers)}</td>
      <td>${escapeHtml(when)}</td>
    </tr>`;
  }).join("");

  if(filtered.length > 500){
    locatorBody.insertAdjacentHTML("beforeend", `<tr><td colspan="5" class="muted">Showing first 500 results. Narrow the filters for more precise results.</td></tr>`);
  }
}

function setLocatorToNow(){
  const jsDay = new Date().getDay();
  const dayCode = jsDayToCode[jsDay] || "";
  dayFilter.value = dayCode;
  periodFilter.value = dayCode ? currentPeriodForDay(dayCode) : "";
  renderLocator();
}

function update(){
  clockEl.textContent = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  let txt = "";

  if(mode === "ramadan"){
    txt = highlight(pypBody,"PYP") + " | " + highlight(secondaryBody,"Secondary");
  } else if(mode === "friday") {
    txt = highlight(regularBody,"Friday");
  } else if(mode === "locator") {
    const d = dayFilter.value || jsDayToCode[new Date().getDay()] || "";
    const p = periodFilter.value || currentPeriodForDay(d);
    txt = "Class Locator" + (d ? `: ${dayNames[d]} ${p ? periodName(d,p) : ""}` : "");
  } else {
    txt = highlight(regularBody,"Regular");
  }

  nowLabel.textContent = txt;
}

function setMode(m){
  mode = m;

  tabRamadan.setAttribute("aria-selected", String(m === "ramadan"));
  tabRegular.setAttribute("aria-selected", String(m === "regular"));
  tabFriday.setAttribute("aria-selected", String(m === "friday"));
  tabLocator.setAttribute("aria-selected", String(m === "locator"));

  ramadanGrid.style.display = (m === "ramadan") ? "grid" : "none";
  regularSingle.style.display = (m === "regular" || m === "friday") ? "block" : "none";
  locatorPanel.style.display = (m === "locator") ? "block" : "none";

  if(m === "ramadan"){
    build(pypBody, ramadanPYP);
    build(secondaryBody, ramadanSecondary);
  } else if(m === "friday") {
    regularTitle.textContent = "Friday";
    build(regularBody, fridaySchedule);
  } else if(m === "locator") {
    renderLocator();
  } else {
    regularTitle.textContent = "Regular";
    build(regularBody, regularSchedule);
  }

  update();
}

[tabRamadan, tabRegular, tabFriday, tabLocator].forEach(tab => {
  tab.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" ") tab.click(); });
});

tabRamadan.addEventListener("click", () => setMode("ramadan"));
tabRegular.addEventListener("click", () => setMode("regular"));
tabFriday.addEventListener("click", () => setMode("friday"));
tabLocator.addEventListener("click", () => setMode("locator"));
[classFilter, dayFilter, periodFilter, textFilter].forEach(el => el.addEventListener("input", renderLocator));
nowButton.addEventListener("click", setLocatorToNow);
clearButton.addEventListener("click", () => {
  classFilter.value = ""; dayFilter.value = ""; periodFilter.value = ""; textFilter.value = ""; renderLocator();
});

populateClassFilter();
setLocatorToNow();
setMode(mode);
setInterval(update, 1000);
